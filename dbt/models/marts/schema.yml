version: 2

models:
  - name: mart_condo_price
    description: "物件単位の分析完成テーブル（Tableau/BQML用）。両Fold保持・予測特徴量は補完済みを正規名で公開・スコア用項目は分離。新規出現駅はmodel_eligible=FALSEで除外（D-017）。"
    columns:
      # --- キー / 属性 ---
      - name: trade_year
        description: "取引年（例: 2023）"
      - name: trade_quarter
        description: "取引四半期（1〜4）"
      - name: fold
        description: "分割識別。A=訓練2021-2024/テスト2025（本番）、B=訓練2021-2023/テスト2024（検証）。物件は両Foldに各1行ずつ出る"
        tests:
          - not_null
          - accepted_values:
              values: ['A', 'B']
      - name: split
        description: "学習区分。train=訓練期間 / test=テスト期間"
        tests:
          - not_null
          - accepted_values:
              values: ['train', 'test']
      - name: ward
        description: "区（大阪市○○区）"
      - name: district
        description: "地区名（大字・丁目）"
      - name: station_name
        description: "最寄り駅名（正規化後）"
        tests:
          - not_null
      - name: line_name
        description: "最寄り駅の代表路線名"
      - name: station_lat
        description: "最寄り駅の緯度（大阪府周辺で集約した代表点）"
      - name: station_lon
        description: "最寄り駅の経度（同上）"

      # --- 目的変数 ---
      - name: trade_price
        description: "成約価格（円・総額）"
      - name: price_per_sqm
        description: "実㎡単価（成約価格 ÷ 専有面積、円/m²）"
        tests:
          - not_null
      - name: log_price_per_sqm
        description: "㎡単価の自然対数。BQMLの目的変数（価格の歪みを抑えるためログ変換）"
        tests:
          - not_null

      # --- 予測モデル用の特徴量（補完済みの値を正規名で公開）---
      - name: area_sqm
        description: "専有面積（m²）。予測特徴量"
        tests:
          - not_null
      - name: building_age_years
        description: "築年数（成約年−建築年。欠損は当該Fold訓練の駅→区→全体中央値で補完済み）。予測特徴量"
        tests:
          - not_null
      - name: walk_minutes
        description: "最寄り駅までの徒歩分（欠損は当該Fold訓練の駅→区中央値で補完済み）。予測特徴量"
        tests:
          - not_null
      - name: renovation_done_flag
        description: "改装済みフラグ（改装済み=1）。予測特徴量。※耐震補強済みは意味しない"
      - name: seismic_new
        description: "新耐震フラグ（補完後築年で推定建築年>=1982なら1）。予測特徴量"
        tests:
          - not_null
      - name: station_median_price_per_sqm
        description: "駅の中央値㎡単価（当該Fold訓練期間のみから算出・リーク防止）。予測特徴量。新規出現駅はNULL（model_eligible=FALSE）"

      # --- スコア用（予測モデルには入れない・v9核心）---
      - name: nearest_land_price
        description: "最寄り公示地点の地価（円/m²）。地価・エリア補足スコア用"
      - name: land_price_change_rate
        description: "最寄り公示地点の対前年変動率（%）。地価変化スコア用"
      - name: land_price_distance_m
        description: "駅から最寄り公示地点までの距離（m）。地価の距離補正用"
      - name: station_transaction_count
        description: "駅の取引件数（当該Fold訓練期間）。市場信頼性スコア・サンプル不足リスク用"
      - name: station_price_iqr
        description: "駅内㎡単価のIQR（四分位範囲）。市場信頼性スコア（価格の安定性）用"
      - name: renovation_unknown_flag
        description: "改装情報が不明（空欄）フラグ。データ品質スコア・リスク減点用（予測には入れない）"
      - name: station_joined
        description: "駅マスタと結合できたか（TRUE=結合成功）。データ品質スコア用"
      - name: seismic_old_flag
        description: "旧耐震フラグ（推定建築年<1982なら1。seismic_newと相補）。リスク減点用。推定由来かはis_imputed_building_ageで区別"

      # --- データ品質フラグ ---
      - name: is_imputed_building_age
        description: "築年数を補完したか（TRUE=補完）。データ品質スコア・リスク減点用"
      - name: is_imputed_walk_minutes
        description: "徒歩分を補完したか（TRUE=補完）。データ品質スコア・リスク減点用"
      - name: is_imputed_land_price
        description: "公示価格を補完したか（TRUE=補完。基本は実計算で非該当）"
      - name: is_negative_age
        description: "築年数がマイナス（竣工前売買/誤記）で0補正した行か。リスク材料"
      - name: potential_dup_flag
        description: "全21列が一致する完全重複の識別（D-005。集約せず保持）。データ品質用"
      - name: outlier_pps_flag
        description: "㎡単価5万円/m²未満フラグ（物理的ミス候補・D-002）"

      # --- D-017: 新規出現駅の識別と適格フラグ ---
      - name: station_history_missing
        description: "新規出現駅で駅相場（駅中央値）が無い行（D-017）。model_eligibleの否定"
      - name: model_eligible
        description: "モデル学習・予測・候補ランキングの対象か（駅相場ありの行=TRUE・D-017）"
        tests:
          - not_null

      # --- 参考（元データ）---
      - name: layout
        description: "間取り（元データ。例: ２ＬＤＫ）"
      - name: renovation
        description: "改装状況（元データ。空欄=不明、改装済み）"
      - name: built_year
        description: "建築年（元データ。例: 2013年。空欄あり）"

  - name: mart_opportunity_list
    description: "駅単位の調査優先度ランキング（本命の成果物・D-024）。2025年取引10件以上の駅を、割安度45+市場信頼性25+地価補足15+データ品質15−リスク20でスコア化（D-027/D-028）。仕入れが優先調査すべきエリアの一次スクリーニング。買い判断ではなく逆選択のため人の現物確認前提。"
    columns:
      - name: station_name
        description: "駅名（正規化後）。ランキングのキー。"
        tests:
          - not_null
          - unique
      - name: ward
        description: "代表区（大阪市○○区。駅が区境をまたぐ場合は最頻区）。"
      - name: line_name
        description: "代表路線名。"
      - name: station_lat
        description: "駅代表点の緯度（Tableau地図用）。"
      - name: station_lon
        description: "駅代表点の経度（Tableau地図用）。"
      - name: n_transactions_2025
        description: "2025年のscope内取引件数（10件以上に限定）。割安シグナルの土台。"
        tests:
          - not_null
      - name: actual_median_price_per_sqm
        description: "2025年の実勢㎡単価の中央値（円/m²）。エリア水準の参考。"
      - name: under_level
        description: "①駅水準の割安度＝station_median_adjusted_deviation。負ほど相場（立地・築年から期待される水準）より安いエリア。割安度45点の主軸。"
      - name: bargain_share
        description: "②補助：駅内で-15%以上安い物件の比率。割高エリアでも高くなり得る（逆選択の目印）。スコアには使わず併記。"
      - name: sc_value
        description: "割安度スコア（最大45）。under_levelが安い順のパーセンタイル×45。"
      - name: sc_reliability
        description: "市場信頼性スコア（最大25・バランス型）＝件数(0.6)+IQR狭さ(0.4)の加重。取引件数が多く相場が締まっているほど高い。"
      - name: sc_land
        description: "地価補足スコア（最大15）。駅平均の公示価格が高いほど高い（エリア基礎体力）。"
      - name: sc_quality
        description: "データ品質スコア（最大15）＝15×(1−補完物件割合)。D-029で改装不明(94%欠損)は除外し補完フラグのみで算出。"
      - name: risk_penalty
        description: "リスク減点（0〜−20）。旧耐震×改装・築年マイナス補正・重複・外れ値の物件割合に比例。"
      - name: priority_score
        description: "調査優先度の総合スコア（0〜100クリップ）。各要素の合計。"
        tests:
          - not_null
      - name: priority_rank
        description: "priority_score（バランス型）降順の順位（1位＝最優先調査エリア）。"
        tests:
          - not_null
      - name: score_discount
        description: "PART17-3 割安重視型(60/15/10/15/-20)のスコア。割安候補を広く拾う配点。"
      - name: rank_discount
        description: "割安重視型での順位。"
      - name: score_risk
        description: "PART17-3 リスク重視型(35/30/15/20/-30)のスコア。安定候補を優先する配点。"
      - name: rank_risk
        description: "リスク重視型での順位。"
      - name: stable_flag
        description: "安定候補フラグ（PART17-3/17-4）。3配点中2回以上Top20ならTRUE。配点を変えても上位＝頑健な候補。"
      - name: old_seismic_share
        description: "C案/PART15-A：旧耐震(推定建築年<1982)物件の割合。減点でなく要確認理由として表示。"
      - name: high_risk_share
        description: "C案/PART15-A：旧耐震×改装不明（リスク高）物件の割合。現場が要確認理由を見るための列。"
      - name: iqr_ratio
        description: "透明性用：駅㎡単価のIQR÷中央値。小さいほど相場が安定。"
      - name: avg_land_price
        description: "透明性用：駅周辺の最寄り公示価格の平均（円/m²）。"
      - name: quality_issue_share
        description: "透明性用：補完（築年・徒歩・地価）を含む物件の割合。D-029で改装不明は除外。"
      - name: risk_share
        description: "透明性用：リスク該当（旧耐震×改装・築年補正・重複・外れ値）物件の割合。"
      - name: station_transaction_count
        description: "透明性用：訓練期間（2021-2024）のscope内取引件数。"
