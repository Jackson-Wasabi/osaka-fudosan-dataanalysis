name: osaka_fudosan_dataanalysis
version: '1.0.0'
config-version: 2

profile: osaka_fudosan_dataanalysis

# 匿名使用統計の送信を無効化（送信先コレクタへの接続がこの環境でハングするため）
flags:
  send_anonymous_usage_stats: false

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  osaka_fudosan_dataanalysis:
    +persist_docs:
      relation: true
      columns: true
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
